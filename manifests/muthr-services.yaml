# Lima template for muthr-services VM (SearXNG + mcp-searxng)
# Self-contained — extends no base templates
# Usage: muthr services start

minimumLimaVersion: 2.0.0

vmType: "vz"
mountType: "virtiofs"

images:
  - location: "https://cloud.debian.org/images/cloud/trixie/20260525-2489/debian-13-genericcloud-arm64-20260525-2489.qcow2"
    arch: "aarch64"
    digest: "sha512:b4f9240559da2c044953418d0632cee4d45e3d447a0ec6a9129ef7946e39ec4135ec9e085c176f8dc77af6536d7279c03487e9aa61fd6c628fb493886e23aef5"
  - location: "https://cloud.debian.org/images/cloud/trixie/daily/latest/debian-13-genericcloud-arm64-daily.qcow2"
    arch: "aarch64"

cpus: 1
memory: "2GiB"
disk: "20GiB"

upgradePackages: true

containerd:
  user: true

ssh:
  forwardAgent: false

hostResolver:
  enabled: true
  ipv6: false

portForwards:
  - guestPort: 8080
    hostPort: 18766
  - guestPort: 18765
    hostPort: 18765

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update && apt-get upgrade -y
      apt-get install -y curl ca-certificates gnupg nodejs npm python3

  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      export DEBIAN_FRONTEND=noninteractive
      SearxngDir="{{.Home}}/searxng"
      MCP_DIR="{{.Home}}/.local"

      if [ ! -f "${SearxngDir}/docker-compose.yml" ]; then
        mkdir -p "${SearxngDir}"

        curl -fsSL \
          -o "${SearxngDir}/docker-compose.yml" \
          "https://raw.githubusercontent.com/searxng/searxng/master/container/docker-compose.yml"

        SECRET_KEY=$(openssl rand -hex 32)
        printf 'SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml\nSEARXNG_SECRET=%s\n' "${SECRET_KEY}" > "${SearxngDir}/.env"
        mkdir -p "${SearxngDir}/core-config"
        printf 'use_default_settings: true\nsearch:\n  formats:\n    - html\n    - json\n' > "${SearxngDir}/core-config/settings.yml"

        cd "${SearxngDir}" && nerdctl compose up -d
      fi

      if [ ! -f "${MCP_DIR}/lib/node_modules/mcp-searxng/dist/cli.js" ]; then
        mkdir -p "${MCP_DIR}/lib"
        npm install -g --prefix "${MCP_DIR}" mcp-searxng
      fi

      if [ ! -f "{{.Home}}/mcp-stdio.sh" ]; then
        printf '%s\n' '#!/bin/bash' 'set -euo pipefail' "exec bash -l -c 'SEARXNG_URL=http://localhost:8080 node {{.Home}}/.local/lib/node_modules/mcp-searxng/dist/cli.js --stdio'" > "{{.Home}}/mcp-stdio.sh"
        chmod +x "{{.Home}}/mcp-stdio.sh"
      fi

      if ! grep -qF 'mcp-searxng PATH' "{{.Home}}/.zshenv" 2>/dev/null; then
        printf '\nexport PATH="$HOME/.local/bin:$PATH"\n' >> "{{.Home}}/.zshenv"
      fi

      echo "========================================================"
      echo "[ OK ] muthr-services VM provisioning complete"
      echo "   SearXNG web UI:  http://127.0.0.1:18766 (Lima port forward)"
      echo "   mcp-searxng API: http://127.0.0.1:18765/mcp (Lima port forward)"
      echo "========================================================"
