[*]
host = 127.0.0.1
port = 8080
n-gpu-layers = -1
flash-attn = true
mlock = true
threads = 8
threads-batch = 8

[01-qwen3-5-9b]
model = ~/opt/models/unsloth/Qwen3.5-9B-GGUF/Qwen3.5-9B-Q4_K_M.gguf
parallel = 1
no-context-shift = true
load-on-startup = true
jinja = true

# Performance - tuned for 24GB
batch-size = 2048
ubatch-size = 512
ctx-size = 131072
cache-type-k = q8_0
cache-type-v = q8_0
cache-ram = 3072

# Sampling
temp = 0.6
top-p = 0.95
min-p = 0.05
top-k = 40
repeat-penalty = 1.05
repeat-last-n = 512
